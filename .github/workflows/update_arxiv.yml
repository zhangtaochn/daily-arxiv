name: Update arxiv papers

on:
  schedule:
    - cron: '0 20 * * *' # 每天北京时间凌晨4点运行
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run fetch_arxiv.py
        run: |
          python scripts/fetch_arxiv.py
      - name: Run classify_papers.py
        env:
          API_KEY: ${{ secrets.API_KEY }}
          BASE_URL: ${{ secrets.BASE_URL }}
          MODEL: ${{ secrets.MODEL }}
          
        run: |
          python scripts/classify_papers.py
      - name: Commit and push changes
        run: |
          git config --global user.name 'zhangtaochn'
          git config --global user.email 'zhangtao-1994@qq.com'
          git add data/
          git commit -m "Update arxiv papers [skip ci]" || echo "No changes to commit"
          git push
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.ACCESS_TOKEN }}
          publish_dir: . 
